<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#f1f5f9;
color:#0f172a;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h1{
font-size:26px;
font-weight:800;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.card h3{
font-size:13px;
color:#64748b;
}

.card strong{
font-size:24px;
}

/* FORM */
.form{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
background:#fff;
padding:15px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.form input,.form select{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.form button{
background:#0f172a;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

/* TABELA */
table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:12px;
overflow:hidden;
}

thead{
background:#0f172a;
color:#fff;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f8fafc;
}

.receita{color:#16a34a;font-weight:600}
.despesa{color:#dc2626;font-weight:600}

/* INPUT EDIT */
.editavel{
border:none;
background:transparent;
width:100%;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<h1>Controle Financeiro</h1>
<button onclick="carregar()">🔄 Atualizar</button>
</div>

<div class="cards">
<div class="card"><h3>Receitas</h3><strong id="receita">R$ 0</strong></div>
<div class="card"><h3>Despesas</h3><strong id="despesa">R$ 0</strong></div>
<div class="card"><h3>Saldo</h3><strong id="saldo">R$ 0</strong></div>
</div>

<div class="form">
<input type="date" id="data">
<input id="descricao" placeholder="Descrição">

<input id="categoria" placeholder="Categoria">

<input id="valor" placeholder="R$ 0,00" oninput="formatarMoeda(this)">

<select id="tipo">
<option value="DESPESA">Despesa</option>
<option value="RECEITA">Receita</option>
</select>
<input type="file" id="anexo"> <!-- 🔥 AQUI -->

<button onclick="salvar()">Salvar</button>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Valor</th>
<th>Tipo</th>
<th>Anexo</th> <!-- 🔥 NOVO -->
<th>Ação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let dados=[];

/* MÁSCARA */
function formatarMoeda(input){
 let v = input.value.replace(/\D/g,'');
 v = (v/100).toFixed(2)+'';
 v = v.replace(".",",");
 v = v.replace(/\B(?=(\d{3})+(?!\d))/g,".");
 input.value = "R$ "+v;
}

/* CONVERTE */
function moedaParaNumero(v){
 return parseFloat(v.replace("R$","").replace(/\./g,"").replace(",","."));
}

/* CARREGAR */
async function carregar(){
 const { data } = await sb.from("jaqueline").select("*").order("data",{ascending:false});
 dados = data || [];
 render();
}

/* RENDER */
function render(){
 let receita=0, despesa=0;

 const tabela = document.getElementById("tabela");
 tabela.innerHTML="";

 dados.forEach(i=>{

 const v = parseFloat(i.valor)||0;

 if(i.tipo==="RECEITA") receita+=v;
 else despesa+=v;

 tabela.innerHTML+=`
 <tr>
<td>${formatarDataBR(i.data)}</td>
 <td contenteditable onblur="editar('${i.id}','descricao',this.innerText)">
 ${i.descricao||""}
 </td>

 <td contenteditable onblur="editar('${i.id}','categoria',this.innerText)">
 ${i.categoria||""}
 </td>

 <td contenteditable onblur="editarValor('${i.id}',this.innerText)"
 class="${i.tipo==='RECEITA'?'receita':'despesa'}">
 R$ ${v.toLocaleString('pt-BR',{minimumFractionDigits:2})}
 </td>

<td>${i.tipo}</td>

<td>
 ${i.anexo_url 
   ? `<a href="${i.anexo_url}" target="_blank">📎 Ver</a>` 
   : "-"
 }
</td>

<td><button onclick="excluir('${i.id}')">🗑️</button></td>


 </tr>
 `;
 });

 document.getElementById("receita").innerText="R$ "+receita.toLocaleString('pt-BR',{minimumFractionDigits:2});
 document.getElementById("despesa").innerText="R$ "+despesa.toLocaleString('pt-BR',{minimumFractionDigits:2});
 document.getElementById("saldo").innerText="R$ "+(receita-despesa).toLocaleString('pt-BR',{minimumFractionDigits:2});
}

/* SALVAR */
async function salvar(){

 const valorFormatado = moedaParaNumero(document.getElementById("valor").value);
 const file = document.getElementById("anexo").files[0];

 let url = null;

 // 🔥 UPLOAD
 if(file){

   const nomeArquivo = Date.now() + "_" + file.name;

   const { error: uploadError } = await sb.storage
     .from("buffet")
     .upload("jaqueline/" + nomeArquivo, file);

   if(uploadError){
     alert("Erro no upload");
     console.error(uploadError);
     return;
   }

   const { data } = sb.storage
     .from("buffet")
     .getPublicUrl("jaqueline/" + nomeArquivo);

   url = data.publicUrl;
 }

 const obj = {
  data: document.getElementById("data").value,
  descricao: document.getElementById("descricao").value,
  categoria: document.getElementById("categoria").value,
  valor: valorFormatado,
  tipo: document.getElementById("tipo").value,
  anexo_url: url
 };

 await sb.from("jaqueline").insert([obj]);

 limpar();
 carregar();
}
/* LIMPAR */
function limpar(){
 document.getElementById("descricao").value="";
 document.getElementById("categoria").value="";
 document.getElementById("valor").value="";
}

/* EDITAR TEXTO */
async function editar(id,campo,valor){
 await sb.from("jaqueline").update({[campo]:valor}).eq("id",id);
}

/* EDITAR VALOR */
async function editarValor(id,valor){
 const v = moedaParaNumero(valor);
 await sb.from("jaqueline").update({valor:v}).eq("id",id);
 carregar();
}

/* EXCLUIR */
async function excluir(id){
 if(!confirm("Excluir?")) return;
 await sb.from("jaqueline").delete().eq("id",id);
 carregar();
}

carregar();



function formatarDataBR(data){

  if(!data) return "";

  const d = new Date(data);

  const dia = String(d.getDate()).padStart(2,"0");
  const mes = String(d.getMonth()+1).padStart(2,"0");
  const ano = d.getFullYear();

  return `${dia}/${mes}/${ano}`;
}



 
</script>

</body>
</html>
